<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Promos - Bros Burger y Lomos</title>
        <link rel="icon" type="image/jpeg" href="../files/logo_bros.jpeg">
    <link rel="stylesheet" href="../styles/estilos.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
</head>
<body>
    <!-- Encabezado -->
    <header class="header">
        <div class="container">
            <div class="logo">
                <img src="../files/logo_bros.jpeg" alt="Logo Bro's" class="logo-img">
                <div class="logo-text">
                    <h1>Bro's Burger y Lomos</h1>
                    <p>¡No hacemos comida hacemos quilombo de sabor!</p>
                </div>
            </div>
            <div class="carrito-icon">
                <a href="carrito.html" class="btn-carrito">
                    <i class="fas fa-shopping-cart"></i>
                    <span id="contador-carrito" class="contador">0</span>
                </a>
            </div>
        </div>
    </header>

    <!-- Sección de productos -->
    <div class="productos-header">
        <div class="container">
            <h1>🎉 Promos Especiales</h1>
            <p>Ofertas increíbles y combos deliciosos</p>
        </div>
    </div>

    <main class="container">
        <a href="../index.html" class="btn-volver-inicio">← Volver al Inicio</a>
        <div class="grid-productos" id="grid-promos"></div>
    </main>

    <!-- Footer -->
    <footer class="footer">
        <p>&copy; 2026 Bros Burger y Lomos. Todos los derechos reservados.</p>
    </footer>

    <script src="../javascript/main.js"></script>
</body>
</html>
